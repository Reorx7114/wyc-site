name: Apply V1.3 service platform files

on:
  push:
    branches:
      - feature/v1.3-service-platform
    paths:
      - .v13-files.tgz

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v1.3-service-platform
          fetch-depth: 0
      - name: Apply reviewed files
        run: |
          tar -xzf .v13-files.tgz
          rm .v13-files.tgz .github/workflows/apply-v13.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app components lib docs
          git commit -m "Add V1.3 service request platform"
          git push origin HEAD:feature/v1.3-service-platform
