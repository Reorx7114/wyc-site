name: Repair service request form

on:
  push:
    branches: [feature/v1.3-service-platform]
    paths: [.fix-service-form.tgz]

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v1.3-service-platform
          fetch-depth: 0
      - run: |
          tar -xzf .fix-service-form.tgz
          rm .fix-service-form.tgz .github/workflows/repair-service-form.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/ServiceRequestForm.tsx .fix-service-form.tgz .github/workflows/repair-service-form.yml
          git commit -m "Repair service request form source"
          git push origin HEAD:feature/v1.3-service-platform
